<!DOCTYPE html>
<html>
<head>
<title>23橋牌算分網站</title>
</head>
<body>
  <h1>橋牌算分網站 </h1>
  <input type="text" id="numberInput" placeholder="請輸入合約線位">
  <select id="mySelect">
    <option value="">--請選擇--</option>
    <option value="a">club</option>
    <option value="b">diamond</option>
    <option value="c">heart</option>
    <option value="d">spade</option>
    <option value="e">NT</option>
</select>
  身價<input type="checkbox" id="bodyprice"> <br>
  賭倍<input type="text" id="doubles" placeholder="請輸入doubles"><br>
  結果(倒多少直接輸入數字即可，成輸入make多少）<select id="resultMD">
    <option value="">--請選擇--</option>
    <option value="M">make</option>
    <option value="D">down</option>
  </select>
  <input type="text" id="Gresult" placeholder="結果是多少"><br>
  <button onclick="showNumber()">顯示結果</button>
  <button onclick="showpoints()">計算分數</button>
  <p id="result"></p>
  <p id="points"></p>
<script>
function showNumber() {
    let input = document.getElementById("numberInput").value;    
    let select = document.getElementById("mySelect");
    let text = select.options[select.selectedIndex].text;
    let isChecked = document.getElementById("bodyprice").checked;
   let doubles =parseInt( document.getElementById("doubles").value) || 0; 
  let Gresult = parseInt(document.getElementById("Gresult").value);
    let text2="結果：";
    if (isChecked) {
        text2="有身價";
    } else {
       text2="沒身價";
    }
  text2+=input+text;
  for(let i=1;i<=doubles;i++){
    text2+="X";
  }
  let MD = document.getElementById("resultMD").value;
  if(MD=="M"){
    text2+=`+${Gresult-input}`;
  }
  else{
    text2+=`-${Gresult}`;
  }
    document.getElementById("result").innerText =  text2;
}
function showpoints(){
   let isChecked = document.getElementById("bodyprice").checked;
   let doubles = parseInt(document.getElementById("doubles").value) ||0;
  let input = parseInt(document.getElementById("numberInput").value);    
    let select = document.getElementById("mySelect").value;
    let roundP=countroundP(select,input,doubles);  
    let prizepointscore=countprizepoints(input,select,doubles,isChecked);
  let Gresult =parseInt( document.getElementById("Gresult").value) || 0;
  let MD = document.getElementById("resultMD").value;
  if(MD=="D"){
    let a=countlosspoint(doubles,Gresult,isChecked);
    document.getElementById("points").innerText = `倒${Gresult}敦，失去${a}分`;
    return 0;
  }
  let over=countextra(select,(Gresult-input),doubles,isChecked);
    let totalscore=roundP+prizepointscore+over;
    document.getElementById("points").innerText = `每敦分數共${roundP}，獎分${prizepointscore}，超敦分${over}，共${totalscore}分`;
  }
  function countroundP(select,con,double){
    let input = parseInt(con);    
    let roundP=0;
    let doubles =parseInt(double)||0;
    if(select==""){
      document.getElementById("points").innerText = "無效合約";
      return 0;
    }
    if(select=="a"||select=="b"){
      roundP+=20*input;
    }
    if(select=="c"||select=="d"){
      roundP+=30*input;
    }
    if(select=="e"){
      roundP+=30*input+10;
    }
    return roundP*(2**doubles);
  }
function countprizepoints(input,select,doubles,isChecked){
    let roundP=countroundP(select,input,doubles);
  
    let bonus=50*(parseInt( document.getElementById("doubles").value)||0);
    if(input>=7){
      if(isChecked) bonus+=2000;
      else bonus+=1300;
    }
    else if(input==6){
      if(isChecked) bonus+=1250;
      else bonus+=800;
    }
  else if(roundP>=100){
    if(isChecked) bonus+=500;
      else bonus+=300;
  }
  else bonus+=50;
return bonus;

}
function countlosspoint(double,loss,vul){
    if(loss<=0) {
      return 0;
    }
    if(double==0){
      let a=50*loss;
      if(vul) a*=2;
      return a;
    }
    if(vul){
      return  double*100*loss*2-double*100;
      
    }
    if(vul==false&& loss<=2){
      return -250*double - 300*loss + 450*double*loss + 300;
    }
    return countlosspoint(double,loss-2,true);
  }
  function countextra(type,over,double,vul){
    let bonus=0;
    let select=type;
    if(double==0){
    if(select=="a"||select=="b"){
     bonus+=20*over;
    }
    if(select=="c"||select=="d"){
      bonus+=30*over;
    }
    if(select=="e"){
      bonus+=30*over;
    }
    }
    else{
      bonus+=50*over*(2**double);
      if(vul) bonus*=2;
    }
    return bonus;
  }
</script>
</body> </html>
