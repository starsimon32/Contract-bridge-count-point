<!DOCTYPE html>
<html>
<head>
<title>9橋牌算分網站</title>
</head>
<body>
  <h1>橋牌算分網站 </h1>
  <input type="text" id="numberInput" placeholder="請輸入合約線位">
  <select id="mySelect">
    <option value="">--請選擇--</option>
    <option value="a">club</option>
    <option value="b">diamond</option>
    <option value="c">heart</option>
    <option value="d">spade</option>
    <option value="e">NT</option>
</select>
  <input type="checkbox" id="bodyprice"> 身價
  <input type="text" id="doubles" placeholder="請輸入doubles">賭倍
  <input type="text" id="Gresult" placeholder="請輸入結果">結果
  <button onclick="showNumber()">計算</button>
  <button onclick="showpoints()">計算分數</button>
  <p id="result"></p>
  <p id="points"></p>
<script>
function showNumber() {
    let input = document.getElementById("numberInput").value;    
    let select = document.getElementById("mySelect");
    let text = select.options[select.selectedIndex].text;
    let isChecked = document.getElementById("bodyprice").checked;
   let doubles = document.getElementById("doubles").value; 
  let Gresult = document.getElementById("Gresult").value;
    let text2="";
    if (isChecked) {
        text2="有身價";
    } else {
       text2="沒身價";
    }
    document.getElementById("result").innerText = "你輸入的是:" + input + text +text2+"賭倍"+doubles+"結果"+Gresult;
}
function showpoints(){
   let isChecked = document.getElementById("bodyprice").checked;
   let doubles = document.getElementById("doubles").value; 
    let input = parseInt(document.getElementById("numberInput").value);    
    let select = document.getElementById("mySelect").value;
    let roundP=countroundP();  
    let prizepointscore=countprizepoints();
  let Gresult =parseInt( document.getElementById("Gresult").value);
  if(Gresult<input){
    let a=countlosspoint(doubles,input-Gresult,isChecked);
    document.getElementById("points").innerText = `倒${Gresult-input}敦，失去${a}分`;
    return 0;
  }
  let over=countextra(select,(Gresult-input),doubles,isChecked);
    let totalscore=roundP+prizepointscore+over;
    document.getElementById("points").innerText = `每敦分數共${roundP}，獎分${prizepointscore}，超敦分${over}，共${totalscore}分`;
  }
  function countroundP(){
    let input = parseInt(document.getElementById("numberInput").value);    
    let select = document.getElementById("mySelect").value;
    let roundP=0;
    let doubles =parseInt( document.getElementById("doubles").value)||0;
    if(select==""){
      document.getElementById("points").innerText = "無效合約";
      return 0;
    }
    if(select=="a"||select=="b"){
      roundP+=20*input;
    }
    if(select=="c"||select=="d"){
      roundP+=30*input;
    }
    if(select=="e"){
      roundP+=30*input+10;
    }
    return roundP*(2**doubles);
  }
function countprizepoints(){
    let isChecked = document.getElementById("bodyprice").checked;
    let input = parseInt(document.getElementById("numberInput").value);    
    let select = document.getElementById("mySelect").value;
    let roundP=countroundP();
  
    let bonus=50*(parseInt( document.getElementById("doubles").value)||0);
    if(input>=7){
      if(isChecked) bonus+=2000;
      else bonus+=1300;
    }
    else if(input==6){
      if(isChecked) bonus+=1250;
      else bonus+=800;
    }
  else if(roundP>=100){
    if(isChecked) bonus+=500;
      else bonus+=300;
  }
  else bonus+=50;
return bonus;

}
  function countlosspoint(double,loss,vul){
     let input = parseInt(document.getElementById("numberInput").value); 
    let Gresult = parseInt(document.getElementById("Gresult").value);
    if(input<=Gresult) return 0;
    let doubles =parseInt( document.getElementById("doubles").value)||0;
    let isChecked = document.getElementById("bodyprice").checked;
    if(doubles==0){
      let a=50*loss;
      if(vul) a*=2;
      return a;
    }
    if(vul){
      return 300*(loss)*(2**(doubles-1))-loss*100;
    }
    if(vul==0 && loss<=2){
      return doubles*100*loss*2-(loss+double-1)*100;
    }
    return countlosspoint(double,loss-2,true);
  }
  function countextra(type,over,double,vul){
    let bonus=0;
    let select=type;
    if(double==0){
    if(select=="a"||select=="b"){
     bonus+=20*over;
    }
    if(select=="c"||select=="d"){
      bonus+=30*over;
    }
    if(select=="e"){
      bonus+=30*over+10;
    }
    }
    else{
      bonus+=50*over*(2**double);
      if(vul) bonus*=2;
    }
    return bonus;
  }
</script>
</body> </html>
